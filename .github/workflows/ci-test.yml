name: CI on test branch

on:
  push:
    branches:
      - test
    paths-ignore:
      - 'coverage_report_40231035.csv'
  pull_request:
    branches:
      - test

permissions:
  contents: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage

      - name: Run tests with coverage
        run: |
          coverage run -m unittest discover -s 40231035/tests
          coverage json -o coverage.json

      - name: Generate CSV report
        run: |
          python generate_coverage_csv.py

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-40231035
          path: |
            coverage.json
            coverage_report_40231035.csv

      - name: Commit CSV report to repository
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage_report_40231035.csv
          git diff --cached --quiet || git commit -m "Add/update coverage CSV report"
          git push